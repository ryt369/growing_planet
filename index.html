<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="生长星球 Three.js 3D 交互版本">
  <title>生长星球 · 3D</title>
  <link rel="stylesheet" href="style.css">

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main class="app">
    <header class="hud">
      <p class="eyebrow">THREE.JS EXPERIENCE</p>
      <h1>生长星球</h1>
      <p class="instructions">点击种植 · 拖拽旋转 · 滚轮缩放</p>
    </header>

    <div id="scene-container" aria-label="生长星球 3D 交互场景"></div>

    <p id="status" class="status" aria-live="polite">
      点击星球表面，种下第一株 3D 植物
    </p>
  </main>

  <noscript>此项目需要启用 JavaScript 才能运行。</noscript>
  <script type="module" src="script.js"></script>
</body>
</html>
